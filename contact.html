<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hypno Rishi - Contact Us</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<style>
		:root {
			--bg-color: #0d0d21;
			--card-bg: rgba(255, 255, 255, 0.03);
			--gold: #ffd700;
			--text-color: #ffffff;
			--text-muted: #88889b;
			--border-color: rgba(255, 215, 0, 0.15);
			--input-bg: rgba(255, 255, 255, 0.05);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Segoe UI', Roboto, sans-serif;
		}

		body {
			background-color: var(--bg-color);
			color: var(--text-color);
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 20px;
		}

		.contact-container {
			width: 100%;
			max-width: 950px;
			background: var(--card-bg);
			border: 1px solid var(--border-color);
			backdrop-filter: blur(10px);
			border-radius: 16px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
			display: grid;
			grid-template-columns: 40% 60%;
			overflow: hidden;
		}

		/* বামদিকের ইনফো সেকশন */
		.contact-info-sidebar {
			background: rgba(255, 215, 0, 0.03);
			border-right: 1px solid var(--border-color);
			padding: 40px 30px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
		}

		.info-header h2 {
			color: var(--gold);
			font-size: 1.8rem;
			margin-bottom: 10px;
		}

		.info-header p {
			color: var(--text-muted);
			font-size: 0.95rem;
			line-height: 1.5;
		}

		.info-links {
			display: flex;
			flex-direction: column;
			gap: 25px;
			margin: 40px 0;
		}

		.info-item {
			display: flex;
			align-items: center;
			gap: 15px;
		}

		.info-item .icon-box {
			width: 45px;
			height: 45px;
			background: rgba(255, 215, 0, 0.1);
			border: 1px solid var(--border-color);
			border-radius: 50%;
			display: flex;
			justify-content: center;
			align-items: center;
			color: var(--gold);
			font-size: 1.1rem;
		}

		.info-item a {
			color: var(--text-color);
			text-decoration: none;
			font-size: 1rem;
			font-weight: 500;
			transition: 0.3s;
		}

		.info-item a:hover {
			color: var(--gold);
		}

		.social-icons {
			display: flex;
			gap: 15px;
		}

		.social-icons a {
			color: var(--text-muted);
			font-size: 1.3rem;
			transition: 0.3s;
		}

		.social-icons a:hover {
			color: var(--gold);
		}

		/* ডানদিকের ফর্ম সেকশন */
		.contact-form-wrapper {
			padding: 40px;
		}

		.contact-form-wrapper h3 {
			font-size: 1.4rem;
			margin-bottom: 25px;
			color: var(--text-color);
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			margin-bottom: 20px;
		}

		.input-group {
			position: relative;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.input-group.full-width {
			grid-column: span 2;
		}

		.input-group label {
			color: var(--gold);
			font-size: 0.85rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		input,
		textarea {
			width: 100%;
			padding: 12px 15px;
			background: var(--input-bg);
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 8px;
			color: var(--text-color);
			font-size: 0.95rem;
			outline: none;
			transition: 0.3s;
		}

		input:focus,
		textarea:focus {
			border-color: var(--gold);
			background: rgba(255, 255, 255, 0.08);
			box-shadow: 0 0 10px rgba(255, 215, 0, 0.15);
		}

		textarea {
			min-height: 120px;
			resize: vertical;
		}

		.submit-btn {
			background: var(--gold);
			color: #000;
			border: none;
			padding: 14px 30px;
			font-size: 1rem;
			font-weight: bold;
			border-radius: 8px;
			cursor: pointer;
			text-transform: uppercase;
			transition: 0.3s;
			display: inline-flex;
			align-items: center;
			gap: 10px;
		}

		.submit-btn:hover {
			background: #ffe240;
			box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
		}

		/* রেসপন্সিভ ডিজাইন (মোবাইলের জন্য) */
		@media (max-width: 768px) {
			.contact-container {
				grid-template-columns: 1fr;
			}

			.contact-info-sidebar {
				border-right: none;
				border-bottom: 1px solid var(--border-color);
				padding: 30px 20px;
			}

			.contact-form-wrapper {
				padding: 30px 20px;
			}

			.form-grid {
				grid-template-columns: 1fr;
			}

			.input-group.full-width {
				grid-column: span 1;
			}
		}
	</style>
</head>

<body>

	<div class="contact-container">

		<div class="contact-info-sidebar">
			<div class="info-header">
				<h2>যোগাযোগ করুন</h2>
				<p>আপনার যেকোনো জিজ্ঞাসা, পরামর্শ বা সহায়তার জন্য আমাদের সাথে সরাসরি যোগাযোগ করতে পারেন।</p>
			</div>

			<div class="info-links">
				<div class="info-item">
					<div class="icon-box"><i class="fas fa-phone-alt"></i></div>
					<div class="text-box">
						<p style="font-size: 0.8rem; color: var(--text-muted);">Call Us</p>
						<a href="tel:+917585960255">+91 7585960255</a>
					</div>
				</div>

				<div class="info-item">
					<div class="icon-box"><i class="fab fa-whatsapp"></i></div>
					<div class="text-box">
						<p style="font-size: 0.8rem; color: var(--text-muted);">WhatsApp</p>
						<a href="https://wa.me/917585960255?text=Hello%20Hypno%20Rishi" target="_blank">Chat on WhatsApp</a>
					</div>
				</div>

				<div class="info-item">
					<div class="icon-box"><i class="fas fa-envelope"></i></div>
					<div class="text-box">
						<p style="font-size: 0.8rem; color: var(--text-muted);">Email Us</p>
						<a href="mailto:support@hypnorishi.com">support@hypnorishi.com</a>
					</div>
				</div>
			</div>

			<div class="social-icons">
				<a href="#"><i class="fab fa-facebook-f"></i></a>
				<a href="#"><i class="fab fa-youtube"></i></a>
				<a href="#"><i class="fab fa-instagram"></i></a>
			</div>
		</div>

		<div class="contact-form-wrapper">
			<h3>একটি বার্তা পাঠান</h3>

			<form id="contactForm">
				<div class="form-grid">
					<div class="input-group">
						<label for="cName">Your Name</label>
						<input type="text" id="cName" placeholder="আপনার নাম লিখুন" required>
					</div>

					<div class="input-group">
						<label for="cPhone">WhatsApp/Phone</label>
						<input type="tel" id="cPhone" placeholder="১০ ডিজিটের নম্বর" pattern="[0-9]{10}" required>
					</div>
				</div>

				<div class="input-group full-width" style="margin-bottom: 20px;">
					<label for="cSubject">Subject</label>
					<input type="text" id="cSubject" placeholder="বিষয়" required>
				</div>

				<div class="input-group full-width" style="margin-bottom: 25px;">
					<label for="cMessage">Message</label>
					<textarea id="cMessage" placeholder="আপনার বার্তাটি এখানে বিস্তারিত লিখুন..." required></textarea>
				</div>

				<button type="submit" class="submit-btn">
					<i class="fas fa-paper-plane"></i> Send Message
				</button>
			</form>
		</div>

	</div>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
		import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

		// আপনার ফায়ারবেস কনফিগারেশন
		const firebaseConfig = {
			apiKey: "AIzaSyAWSP0h6GdY-JZvh0X0hk6Pk6F8ZiFc3kg",
			authDomain: "astrology-8d207.firebaseapp.com",
			projectId: "astrology-8d207",
			storageBucket: "astrology-8d207.firebasestorage.app",
			messagingSenderId: "473083037288",
			appId: "1:473083037288:web:72f71ebeb829da87fe9ddd"
		};

		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		// ফর্ম সাবমিশন লজিক (ডাটাবেসে সেভ করার জন্য)
		document.getElementById('contactForm').addEventListener('submit', async function (e) {
			e.preventDefault();

			const btn = e.target.querySelector('.submit-btn');
			btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Sending...`;
			btn.disabled = true;

			const name = document.getElementById('cName').value;
			const phone = document.getElementById('cPhone').value;
			const subject = document.getElementById('cSubject').value;
			const message = document.getElementById('cMessage').value;

			try {
				// ফায়ারস্টোরের 'contact_messages' কালেকশনে মেসেজ সেভ হবে
				await addDoc(collection(db, "contact_messages"), {
					name: name,
					phone: phone,
					subject: subject,
					message: message,
					timestamp: Date.now()
				});

				alert("আপনার বার্তাটি সফলভাবে পাঠানো হয়েছে! আমরা দ্রুত আপনার সাথে যোগাযোগ করব।");
				e.target.reset();

			} catch (err) {
				console.error("Error saving message: ", err);
				alert("বার্তা পাঠাতে সমস্যা হয়েছে। দয়া করে আবার চেষ্টা করুন।");
			} finally {
				btn.innerHTML = `<i class="fas fa-paper-plane"></i> Send Message`;
				btn.disabled = false;
			}
		});
	</script>
</body>

</html>
